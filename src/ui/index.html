<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>langfuse-relay</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #e6edf3;
    --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149;
    --amber: #d29922; --purple: #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  code, .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
  header {
    display: flex; align-items: center; gap: 16px; padding: 12px 20px;
    border-bottom: 1px solid var(--border); background: var(--panel);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  #stats { display: flex; gap: 20px; margin-left: auto; color: var(--muted); font-size: 12px; }
  #stats b { color: var(--text); font-weight: 600; }
  main { display: grid; grid-template-columns: minmax(340px, 480px) 1fr; height: calc(100vh - 53px); }
  #list-pane { border-right: 1px solid var(--border); overflow-y: auto; }
  #search {
    width: calc(100% - 24px); margin: 12px; padding: 7px 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 13px;
  }
  #search:focus { outline: none; border-color: var(--accent); }
  .trace-row {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; display: flex; flex-direction: column; gap: 3px;
  }
  .trace-row:hover { background: var(--panel); }
  .trace-row.active { background: var(--panel); box-shadow: inset 3px 0 0 var(--accent); }
  .trace-title { font-weight: 600; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .trace-meta { display: flex; gap: 10px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .badge {
    display: inline-block; padding: 0 6px; border-radius: 10px; font-size: 11px;
    border: 1px solid var(--border); color: var(--muted);
  }
  .badge.llm { color: var(--purple); border-color: var(--purple); }
  .badge.err { color: var(--red); border-color: var(--red); }
  #detail-pane { overflow-y: auto; padding: 16px 20px; }
  #detail-pane .placeholder { color: var(--muted); margin-top: 40px; text-align: center; }
  .span-node { margin: 2px 0; }
  .span-line {
    display: flex; align-items: center; gap: 8px; padding: 5px 8px;
    border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .span-line:hover { background: var(--panel); }
  .span-line.selected { background: var(--panel); box-shadow: inset 0 0 0 1px var(--accent); }
  .span-children { margin-left: 22px; border-left: 1px solid var(--border); padding-left: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.llm { background: var(--purple); }
  .dot.tool { background: var(--amber); }
  .dot.agent { background: var(--green); }
  .dot.chain, .dot.other { background: var(--muted); }
  .dot.error { background: var(--red); }
  .span-dur { margin-left: auto; color: var(--muted); font-size: 12px; white-space: nowrap; }
  .span-tokens { color: var(--purple); font-size: 12px; white-space: nowrap; }
  #span-detail { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px; }
  #span-detail h3 { font-size: 14px; margin-bottom: 10px; }
  .kv { display: grid; grid-template-columns: 160px 1fr; gap: 4px 12px; font-size: 13px; margin-bottom: 14px; }
  .kv dt { color: var(--muted); }
  .kv dd { word-break: break-all; }
  .io-block { margin-bottom: 14px; }
  .io-block h4 { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 6px; }
  .io-block pre {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; white-space: pre-wrap; word-break: break-word;
    max-height: 320px; overflow-y: auto; font-size: 12.5px;
  }
  .io-block.input pre { border-left: 3px solid var(--accent); }
  .io-block.output pre { border-left: 3px solid var(--green); }
  details.attrs summary { cursor: pointer; color: var(--muted); font-size: 13px; margin-bottom: 8px; }
</style>
</head>
<body>
<header>
  <h1>langfuse<span>-relay</span></h1>
  <div id="stats"></div>
</header>
<main>
  <div id="list-pane">
    <input id="search" type="search" placeholder="Search traces (name, model, content)…">
    <div id="trace-list"></div>
  </div>
  <div id="detail-pane">
    <div class="placeholder">Select a trace to inspect its spans</div>
  </div>
</main>
<script>
const $ = (sel, el = document) => el.querySelector(sel);
let activeTraceId = null;
let currentSpans = [];

const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

const fmtDur = (ms) => ms >= 1000 ? (ms / 1000).toFixed(2) + 's' : Math.round(ms) + 'ms';
const fmtTime = (ns) => new Date(Number(BigInt(ns) / 1000000n)).toLocaleString();
const fmtTok = (n) => n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);

async function loadStats() {
  const { totals } = await (await fetch('/api/stats')).json();
  $('#stats').innerHTML =
    `<span><b>${totals.traces ?? 0}</b> traces</span>` +
    `<span><b>${totals.spans ?? 0}</b> spans</span>` +
    `<span><b>${totals.llm_calls ?? 0}</b> LLM calls</span>` +
    `<span><b>${fmtTok(totals.prompt_tokens ?? 0)}</b> in / <b>${fmtTok(totals.completion_tokens ?? 0)}</b> out tokens</span>`;
}

async function loadTraces() {
  const q = $('#search').value.trim();
  const url = '/api/traces?limit=100' + (q ? '&q=' + encodeURIComponent(q) : '');
  const { traces } = await (await fetch(url)).json();
  $('#trace-list').innerHTML = traces.map((t) => {
    const dur = t.end_ms - t.start_ms;
    return `<div class="trace-row${t.trace_id === activeTraceId ? ' active' : ''}" data-id="${t.trace_id}">
      <div class="trace-title">${esc(t.root_name || t.model || t.trace_id.slice(0, 16))}</div>
      <div class="trace-meta">
        <span>${new Date(t.start_ms).toLocaleString()}</span>
        <span>${fmtDur(dur)}</span>
        <span class="badge">${esc(t.service)}</span>
        <span class="badge llm">${t.llm_calls} LLM · ${fmtTok(t.total_tokens ?? 0)} tok</span>
        ${t.error_count > 0 ? `<span class="badge err">${t.error_count} err</span>` : ''}
      </div>
    </div>`;
  }).join('') || '<div class="placeholder" style="padding:20px;color:var(--muted)">No traces yet — point an OTLP exporter at <code>/v1/traces</code></div>';
}

function buildTree(spans) {
  const byId = new Map(spans.map((s) => [s.span_id, { span: s, children: [] }]));
  const roots = [];
  for (const node of byId.values()) {
    const parent = node.span.parent_span_id && byId.get(node.span.parent_span_id);
    if (parent) parent.children.push(node);
    else roots.push(node);
  }
  return roots;
}

function renderNode(node) {
  const s = node.span;
  const dotClass = s.status_code === 'ERROR' ? 'error' : (s.span_type || 'other');
  const tokens = s.total_tokens ? `<span class="span-tokens">${fmtTok(s.total_tokens)} tok</span>` : '';
  return `<div class="span-node">
    <div class="span-line" data-span="${s.span_id}">
      <span class="dot ${dotClass}"></span>
      <span>${esc(s.name)}</span>
      ${s.model ? `<span class="badge llm">${esc(s.model)}</span>` : ''}
      ${tokens}
      <span class="span-dur">${fmtDur(s.duration_ms)}</span>
    </div>
    ${node.children.length ? `<div class="span-children">${node.children.map(renderNode).join('')}</div>` : ''}
  </div>`;
}

function showSpanDetail(spanId) {
  const s = currentSpans.find((x) => x.span_id === spanId);
  if (!s) return;
  document.querySelectorAll('.span-line').forEach((el) =>
    el.classList.toggle('selected', el.dataset.span === spanId));
  const attrs = JSON.parse(s.attributes_json || '{}');
  $('#span-detail').innerHTML = `
    <h3>${esc(s.name)}</h3>
    <dl class="kv">
      <dt>Span ID</dt><dd class="mono">${s.span_id}</dd>
      <dt>Type / Kind</dt><dd>${esc(s.span_type)} / ${esc(s.kind)}</dd>
      ${s.model ? `<dt>Model</dt><dd>${esc(s.model)}</dd>` : ''}
      <dt>Start</dt><dd>${fmtTime(s.start_ns)}</dd>
      <dt>Duration</dt><dd>${fmtDur(s.duration_ms)}</dd>
      <dt>Status</dt><dd>${esc(s.status_code)}${s.status_message ? ' — ' + esc(s.status_message) : ''}</dd>
      ${s.total_tokens ? `<dt>Tokens</dt><dd>${s.prompt_tokens ?? '?'} in + ${s.completion_tokens ?? '?'} out = ${s.total_tokens}</dd>` : ''}
      ${s.cost_usd ? `<dt>Cost</dt><dd>$${s.cost_usd}</dd>` : ''}
    </dl>
    ${s.input_text ? `<div class="io-block input"><h4>Input</h4><pre>${esc(s.input_text)}</pre></div>` : ''}
    ${s.output_text ? `<div class="io-block output"><h4>Output</h4><pre>${esc(s.output_text)}</pre></div>` : ''}
    <details class="attrs">
      <summary>Raw attributes (${Object.keys(attrs).length})</summary>
      <div class="io-block"><pre>${esc(JSON.stringify(attrs, null, 2))}</pre></div>
    </details>`;
}

async function openTrace(traceId) {
  activeTraceId = traceId;
  document.querySelectorAll('.trace-row').forEach((el) =>
    el.classList.toggle('active', el.dataset.id === traceId));
  const { spans } = await (await fetch('/api/traces/' + traceId)).json();
  currentSpans = spans;
  const roots = buildTree(spans);
  $('#detail-pane').innerHTML = `
    <div class="trace-meta" style="margin-bottom:12px">
      <span class="mono" style="color:var(--muted)">trace ${traceId}</span>
    </div>
    <div id="span-tree">${roots.map(renderNode).join('')}</div>
    <div id="span-detail"></div>`;
  const firstLlm = spans.find((s) => s.span_type === 'llm') ?? spans[0];
  if (firstLlm) showSpanDetail(firstLlm.span_id);
}

$('#trace-list').addEventListener('click', (e) => {
  const row = e.target.closest('.trace-row');
  if (row) openTrace(row.dataset.id);
});
$('#detail-pane').addEventListener('click', (e) => {
  const line = e.target.closest('.span-line');
  if (line) showSpanDetail(line.dataset.span);
});
let searchTimer;
$('#search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadTraces, 250);
});

loadStats();
loadTraces();
setInterval(() => { loadStats(); loadTraces(); }, 5000);
</script>
</body>
</html>
